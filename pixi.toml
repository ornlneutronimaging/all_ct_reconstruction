[workspace]
authors = ["Jean Bilheux <bilheuxjm@ornl.gov>", "Chen Zhang <zhangc@ornl.gov>"]
channels = ["conda-forge", "pypi"]
name = "all_ct_reconstruction"
platforms = ["linux-64"]
version = "1.0.0"

[tasks]
lab = "jupyter lab --notebook-dir=notebooks"
notebook = "jupyter notebook --notebook-dir=notebooks"

# ── Common dependencies (all platforms) ──────────────────────────
[dependencies]
python = ">=3.13.5,<3.14"
jupyterlab = ">=4.4.4,<5"
jupyter = ">=1.1.1,<2"
algotom = ">=1.6.0,<2"
pydantic = ">=2.11.7,<3"
ipywidgets = ">=8.1.8,<9"
ipython = ">=9.9.0,<10"
ipympl = ">=0.9.7,<0.10"
loguru = ">=0.7.3,<0.8"
cuda-version = "12.*"
jaxlib  = {version="*", build="*cuda*"}
jax = { version = ">=0.9" }
plotly = ">=6.5.2,<7"
numpy = ">=2.0,<3"
scipy = ">=1.14,<2"
scikit-image = ">=0.24,<1"
h5py = ">=3.12,<4"
pandas = ">=2.2,<3"
tqdm = ">=4.66,<5"
psutil = ">=6.0,<7"
astropy = ">=6.1,<7"
tifffile = ">=2024.1,<2026"
tomopy = ">=1.15,<2"
xarray = ">=2026.2.0,<2027"
pytest = ">=9.0.2,<10"


[pypi-dependencies]
neutronbraggedge = ">=2.0.6, <3"
timepix-geometry-correction = { git = "https://github.com/ornlneutronimaging/timepix_geometry_correction.git", branch = "main" }
mbirjax = "*"

# ── Linux-only dependencies (CUDA, MKL) ──────────────────────────
[target.linux-64.dependencies]
astra-toolbox = ">=2.2.0,<3"
svmbir = ">=0.4.0,<0.5"

[target.linux-64.pypi-dependencies]
mkl-fft = ">=2.0.0, <3"

[system-requirements]
cuda = "12.0"
